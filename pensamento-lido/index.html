<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Algoritmo das 21 Cartas - UC2</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .tabuleiro { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .coluna { background: #fff; padding: 10px; border-radius: 8px; border: 2px solid #ddd; width: 120px; }
        .carta { padding: 10px; margin: 5px; background: #e0e0e0; border-radius: 4px; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; background: #0056b3; color: white; border: none; border-radius: 4px; }
        #resultado { font-weight: bold; color: green; margin-top: 20px; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>Mágica Algorítmica: 21 Cartas</h1>
    <p>Escolha uma carta mentalmente e indique em qual coluna ela está por 3 rodadas.</p>
    <p id="contador-rodada">Rodada: 1 / 3</p>

    <div class="tabuleiro">
        <div class="coluna" id="col0"><h3>Coluna 1</h3><div class="cartas"></div><button onclick="escolherColuna(0)">Está aqui</button></div>
        <div class="coluna" id="col1"><h3>Coluna 2</h3><div class="cartas"></div><button onclick="escolherColuna(1)">Está aqui</button></div>
        <div class="coluna" id="col2"><h3>Coluna 3</h3><div class="cartas"></div><button onclick="escolherColuna(2)">Está aqui</button></div>
    </div>

    <div id="resultado"></div>
    <button id="btn-reiniciar" style="display:none;" onclick="reiniciar()">Reiniciar Algoritmo</button>

    <script>
        let cartas = Array.from({length: 21}, (_, i) => `Carta ${i + 1}`);
        let rodada = 1;

        function renderizar() {
            document.querySelectorAll('.cartas').forEach(el => el.innerHTML = '');
            cartas.forEach((carta, index) => {
                const colIndex = index % 3;
                const div = document.createElement('div');
                div.className = 'carta';
                div.innerText = carta;
                document.querySelectorAll('.cartas')[colIndex].appendChild(div);
            });
        }

        function escolherColuna(colunaIndex) {
            if (rodada > 3) return;

            // Lógica de Reordenamento (O "Coração" do Algoritmo)
            let c0 = [], c1 = [], c2 = [];
            cartas.forEach((c, i) => {
                if (i % 3 === 0) c0.push(c);
                if (i % 3 === 1) c1.push(c);
                if (i % 3 === 2) c2.push(c);
            });

            let colunas = [c0, c1, c2];
            let escolhida = colunas.splice(colunaIndex, 1)[0];
            
            // A mágica acontece aqui: A coluna escolhida fica SEMPRE no meio (índice 1 do novo array)
            cartas = [...colunas[0], ...escolhida, ...colunas[1]];

            if (rodada === 3) {
                document.getElementById('resultado').innerText = "Sua carta é: " + cartas[10];
                document.getElementById('btn-reiniciar').style.display = 'inline-block';
            } else {
                rodada++;
                document.getElementById('contador-rodada').innerText = `Rodada: ${rodada} / 3`;
                renderizar();
            }
        }

        function reiniciar() {
            location.reload();
        }

        renderizar();
    </script>
</body>
</html>
